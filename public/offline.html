<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>Nina — Sem ligação</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #1e3a5f;
        --fg: #f4f7fb;
        --muted: #c5d0de;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 30% 20%, #2a4d7a, var(--bg) 55%);
        color: var(--fg);
        text-align: center;
      }
      .card {
        max-width: 24rem;
        padding: 1.75rem 1.5rem;
        border-radius: 1.25rem;
        background: color-mix(in srgb, #fff 8%, transparent);
        backdrop-filter: blur(8px);
      }
      h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
      p { margin: 0 0 1rem; color: var(--muted); line-height: 1.45; font-size: 0.95rem; }
      button, a.btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1.25rem;
        font-weight: 650;
        background: #fff;
        color: #1e3a5f;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin: 0.25rem;
      }
      button.ghost {
        background: transparent;
        color: #fff;
        border: 1px solid color-mix(in srgb, #fff 40%, transparent);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Nina</h1>
      <p>
        Não foi possível contactar o servidor. Isto acontece quando um link temporário expirou
        ou quando estás sem rede — não significa que a Nina esteja avariada.
      </p>
      <p>Usa o URL estável da Vercel (não links trycloudflare) e limpa o cache abaixo.</p>
      <button type="button" id="retry">Limpar cache e tentar de novo</button>
      <button type="button" class="ghost" id="nuke">Remover app em cache</button>
    </div>
    <script>
      async function clearAll() {
        try {
          if ("caches" in window) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }
          if ("serviceWorker" in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
            if (navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage("NUKE_CACHES");
            }
          }
        } catch (e) {}
      }
      document.getElementById("retry").addEventListener("click", async function () {
        await clearAll();
        location.replace("/pt/login?nocache=" + Date.now());
      });
      document.getElementById("nuke").addEventListener("click", async function () {
        await clearAll();
        alert("Cache da Nina removido. Abre o URL estável da Vercel.");
        location.replace("/pt/login?nocache=" + Date.now());
      });
    </script>
  </body>
</html>
