<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>Nina — Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #1e3a5f;
        --fg: #f4f7fb;
        --muted: #c5d0de;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 30% 20%, #2a4d7a, var(--bg) 55%);
        color: var(--fg);
        text-align: center;
      }
      .card {
        max-width: 22rem;
        padding: 1.75rem 1.5rem;
        border-radius: 1.25rem;
        background: color-mix(in srgb, #fff 8%, transparent);
        backdrop-filter: blur(8px);
      }
      h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
      p { margin: 0 0 1rem; color: var(--muted); line-height: 1.45; }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1.25rem;
        font-weight: 650;
        background: #fff;
        color: #1e3a5f;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Nina</h1>
      <p>
        Estás offline. A Nina guarda o que já visitaste e volta a sincronizar quando houver
        rede — capturas novas precisam de ligação.
      </p>
      <button type="button" onclick="location.reload()">Tentar outra vez</button>
    </div>
  </body>
</html>
